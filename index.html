<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NYU Taiwan Alumni Club Albums</title>
  <style>
    :root {
      --nyu-violet: #57068c;
      --nyu-violet-dark: #3d0463;
      --nyu-lavender: #efe7f8;
      --nyu-ink: #22142f;
      --card-border: rgba(87, 6, 140, 0.12);
      --card-shadow: 0 20px 45px rgba(50, 14, 82, 0.12);
      --page-max: 1200px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Noto Sans TC", "PingFang TC", sans-serif;
      color: var(--nyu-ink);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.85), transparent 32%),
        linear-gradient(160deg, #4a0a77 0%, #57068c 32%, #f7f2fb 32%, #ffffff 100%);
      min-height: 100vh;
    }

    .page {
      width: min(calc(100% - 32px), var(--page-max));
      margin: 0 auto;
      padding: 40px 0 56px;
    }

    .hero {
      color: white;
      padding: 20px 0 28px;
    }

    .eyebrow {
      margin: 0 0 10px;
      font-size: 0.85rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.84;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.6rem);
      line-height: 1.05;
      max-width: 10ch;
    }

    .subtitle {
      margin: 16px 0 0;
      max-width: 620px;
      font-size: 1rem;
      line-height: 1.65;
      color: rgba(255, 255, 255, 0.88);
    }

    .albums-shell {
      margin-top: 18px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 28px;
      padding: 22px;
      box-shadow: 0 30px 60px rgba(37, 11, 60, 0.18);
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    .filter-chip {
      appearance: none;
      border: 1px solid rgba(87, 6, 140, 0.14);
      background: white;
      color: var(--nyu-violet);
      border-radius: 999px;
      padding: 10px 14px;
      font: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 160ms ease, color 160ms ease, border-color 160ms ease, transform 160ms ease;
    }

    .filter-chip:hover,
    .filter-chip:focus-visible {
      border-color: rgba(87, 6, 140, 0.34);
      transform: translateY(-1px);
      outline: none;
    }

    .filter-chip.is-active {
      background: var(--nyu-violet);
      color: white;
      border-color: var(--nyu-violet);
      box-shadow: 0 12px 24px rgba(87, 6, 140, 0.18);
    }

    .albums-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 18px;
    }

    .album-card {
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      background: white;
      border: 1px solid var(--card-border);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: var(--card-shadow);
      transform: translateY(0);
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
    }

    .album-card:hover,
    .album-card:focus-visible {
      transform: translateY(-4px);
      box-shadow: 0 24px 50px rgba(50, 14, 82, 0.18);
      border-color: rgba(87, 6, 140, 0.28);
      outline: none;
    }

    .thumb {
      position: relative;
      aspect-ratio: 4 / 3;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0)),
        linear-gradient(155deg, var(--thumb-a, #6f19ac) 0%, var(--thumb-b, #57068c) 48%, var(--thumb-c, #2e0b49) 100%);
    }

    .thumb-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.01);
    }

    .thumb::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(31, 7, 46, 0.06), rgba(31, 7, 46, 0.18) 56%, rgba(31, 7, 46, 0.58)),
        linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0));
      z-index: 0;
    }

    .thumb::after {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background:
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.18), transparent 34%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0));
    }

    .thumb-label {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      color: white;
      font-weight: 700;
      letter-spacing: 0.04em;
      backdrop-filter: blur(8px);
    }

    .thumb-mark {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 1;
      max-width: min(75%, 180px);
      font-size: clamp(1.2rem, 2.3vw, 2rem);
      line-height: 1;
      font-weight: 800;
      color: rgba(255, 255, 255, 0.92);
      text-shadow: 0 8px 24px rgba(20, 4, 34, 0.22);
      word-break: break-word;
      pointer-events: none;
    }

    .thumb-content {
      position: relative;
      z-index: 1;
      display: flex;
      width: 100%;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      padding: 16px;
    }

    .card-body {
      display: flex;
      flex: 1;
      flex-direction: column;
      gap: 10px;
      padding: 18px 18px 20px;
    }

    .card-title {
      margin: 0;
      font-size: 1.03rem;
      line-height: 1.45;
    }

    .card-meta {
      margin: 0;
      color: #6b5d7b;
      font-size: 0.92rem;
    }

    .open-row {
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-top: 2px;
      font-size: 0.92rem;
      color: var(--nyu-violet);
      font-weight: 700;
    }

    .open-pill {
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--nyu-lavender);
    }

    @media (max-width: 640px) {
      .page {
        width: min(calc(100% - 20px), var(--page-max));
        padding: 26px 0 32px;
      }

      .albums-shell {
        padding: 14px;
        border-radius: 22px;
      }

      .albums-grid {
        gap: 14px;
      }

      .card-body {
        padding: 16px;
      }
    }
  </style>
</head>

      "https://photos.app.goo.gl/3rGMG5bsR8oMmgPA9": "https://lh3.googleusercontent.com/pw/AP1GczNXARU5IakXjqcw_zDe_ZVV7nykJHyxvzHo9zZSms6qOTM9IgwR1hskNOTrVFpXXGcA6DthV4fUjTgtprRSSv14KGAhxjUSKt9wNrRq0ALchQ50Fp0=w600-h315-p-k",
      "https://photos.app.goo.gl/NTT5hqeCK2eLyqHj6": "https://lh3.googleusercontent.com/pw/AP1GczN5hdwpmn7x45lydN2niV7ViaukdZucsBjM49MHw8d-OsB8f0bS2YVlEbFXjjbkctzIh3oXc0Hh0A0kdx0_-yvU3tuYfDBMBTJaacr8X9wJUDt1kuo=w600-h315-p-k",
      "https://photos.app.goo.gl/nMmSt74SBHr7kmaj9": "https://lh3.googleusercontent.com/pw/AP1GczOGKwaTNJM8q0mJlSpEl0fJujkBibbQDHa_bD6j0jLkKBQy61uPUrhVlPX165IFTJWuBxzCGLoVKpQ2V28xr844EOWend_MlaznAoFr67tiQq5sd_k=w600-h315-p-k"
    };
    const thumbPalettes = [
      ["#7c2bb6", "#57068c", "#29103e"],
      ["#8c47bf", "#5d148d", "#2f1747"],
      ["#6b30a0", "#4a0f72", "#251038"],
      ["#9b5cc7", "#61258e", "#32104e"],
      ["#7e3fa9", "#57068c", "#31144f"]
    ];

    const formatDate = (value) => {
      const date = new Date(`${value}T00:00:00`);
      return new Intl.DateTimeFormat("en", {
        year: "numeric",
        month: "short",
        day: "numeric"
      }).format(date);
    };

    const createThumbMark = (title) => {
      const asciiWords = title.match(/[A-Za-z0-9]+/g) || [];
      if (asciiWords.length >= 2) {
        return asciiWords.slice(0, 2).map((word) => word[0].toUpperCase()).join("");
      }

      if (asciiWords.length === 1) {
        return asciiWords[0].slice(0, 3).toUpperCase();
      }

      return title.replace(/\s+/g, "").slice(0, 4);
    };

    const sortedAlbums = [...albums].sort((a, b) => b.date.localeCompare(a.date));
    const years = [...new Set(sortedAlbums.map((album) => album.date.slice(0, 4)))];
    let activeYear = "All";

    const renderAlbums = () => {
      albumRoot.innerHTML = "";

      const visibleAlbums = activeYear === "All"
        ? sortedAlbums
        : sortedAlbums.filter((album) => album.date.startsWith(activeYear));

      visibleAlbums.forEach((album, index) => {
        const [a, b, c] = thumbPalettes[index % thumbPalettes.length];
        const thumbnail = thumbnailsByUrl[album.url];
        const card = document.createElement("a");
        card.className = "album-card";
        card.href = album.url;
        card.target = "_blank";
        card.rel = "noopener noreferrer";
        card.setAttribute("aria-label", `${album.title} album`);
        card.style.setProperty("--thumb-a", a);
        card.style.setProperty("--thumb-b", b);
        card.style.setProperty("--thumb-c", c);

        card.innerHTML = `
          <div class="thumb">
            ${thumbnail ? `<img class="thumb-image" src="${thumbnail}" alt="${album.title}" loading="lazy" referrerpolicy="no-referrer">` : ""}
            ${thumbnail ? "" : `<div class="thumb-mark">${createThumbMark(album.title)}</div>`}
            <div class="thumb-content">
              <div class="thumb-label">
                <span>${formatDate(album.date)}</span>
              </div>
            </div>
          </div>
          <div class="card-body">
            <h2 class="card-title">${album.title}</h2>
            <div class="open-row">
              <span>View album</span>
            </div>
          </div>
        `;

        albumRoot.appendChild(card);
      });
    };

    const renderFilters = () => {
      filterRoot.innerHTML = "";

      ["All", ...years].forEach((year) => {
        const chip = document.createElement("button");
        chip.type = "button";
        chip.className = `filter-chip${year === activeYear ? " is-active" : ""}`;
        chip.textContent = year;
        chip.setAttribute("aria-pressed", String(year === activeYear));
        chip.addEventListener("click", () => {
          activeYear = year;
          renderFilters();
          renderAlbums();
        });
        filterRoot.appendChild(chip);
      });
    };

    renderFilters();
    renderAlbums();
  </script>
</body>
</html>
